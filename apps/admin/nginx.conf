server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (SEC-004) ---------------------------------------
    # Применяются ко всем ответам этого server-блока (с `always`, чтобы
    # отдавались и на 4xx/5xx). nginx наследует add_header из server{} в
    # location{} ТОЛЬКО если в данном location нет своих add_header. Поэтому
    # location-блоки ниже, где есть собственные add_header (assets, index.html),
    # дублируют security-заголовки явно.
    #
    # CSP подобрана по реальному коду apps/admin/src:
    #  - default-src 'self': база — всё свой origin.
    #  - script-src 'self': Vite-бандл с хэшами грузится с того же origin;
    #    внешних/inline-скриптов нет (index.html подключает только /src/main.tsx,
    #    который в проде превращается в /assets/*.js). 'unsafe-eval' не нужен.
    #  - style-src 'self' 'unsafe-inline': Tailwind + инлайн-стили (React style=).
    #  - img-src 'self' data: https:: превью проектов/блога с S3
    #    (s3.twcstorage.ru) показываются через <img src>; data: для иконок.
    #  - media-src 'self' https:: <video src> с S3 (ProjectsListPage/MediaUpload).
    #  - connect-src 'self' + API + S3: fetch к API (api.webmogilevtsev.ru,
    #    auth/admin/contacts) и прямой PUT presigned-URL в S3 (useS3Upload →
    #    *.twcstorage.ru).
    #  - font-src 'self' data:: шрифты только system-ui, внешних нет.
    #  - frame-ancestors 'none' + X-Frame-Options DENY: админку нельзя
    #    встраивать в iframe.
    set $csp "default-src 'self'; connect-src 'self' https://api.webmogilevtsev.ru https://*.twcstorage.ru; img-src 'self' data: https:; media-src 'self' https:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'";

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp always;

    # SPA routing — all paths → index.html
    # The admin talks to the API directly via VITE_API_URL (absolute URL baked
    # at build time in Dokploy). nginx no longer needs to proxy /api/*, which
    # previously failed in Dokploy because the service name "api" is not
    # resolvable outside of docker-compose's internal DNS.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached: после деплоя Vite генерирует новые
    # хэшированные бандлы, и закешированный HTML ссылался бы на удалённые
    # файлы (SEC-019). Заголовки безопасности дублируем — собственный
    # add_header в location отменяет наследование из server{}.
    location = /index.html {
        add_header Cache-Control "no-store" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $csp always;
        try_files $uri =404;
    }

    # Cache static assets (хэшированные файлы Vite — безопасно immutable).
    # Заголовки безопасности дублируем по той же причине, что и выше.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $csp always;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/html text/css application/javascript application/json
               image/svg+xml font/woff2 text/plain;
}
