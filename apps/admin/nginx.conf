server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all paths → index.html
    # The admin talks to the API directly via VITE_API_URL (absolute URL baked
    # at build time in Dokploy). nginx no longer needs to proxy /api/*, which
    # previously failed in Dokploy because the service name "api" is not
    # resolvable outside of docker-compose's internal DNS.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/html text/css application/javascript application/json
               image/svg+xml font/woff2 text/plain;
}
