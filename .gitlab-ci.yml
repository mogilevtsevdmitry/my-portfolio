# Билд + push трёх образов monorepo my-portfolio в внутренний GitLab Container
# Registry через kaniko. Запускается на каждый push в main.
#
# Почему kaniko, а не docker-in-docker:
# Наш GitLab Runner работает в Kubernetes-режиме (см. error log: "ContainersNotReady").
# DinD требует /var/run/docker.sock или TCP-конфигурации DOCKER_HOST + TLS, что
# хрупко настраивать. Kaniko — k8s-native: один контейнер, читает Dockerfile,
# собирает OCI-образ и пушит в registry. Auth — через config.json в /kaniko/.docker/.
#
# CI_REGISTRY_IMAGE = gitlab.xn--d1acaxq.xn--p1ai:5050/devops/my-portfolio
# Образы: <CI_REGISTRY_IMAGE>/{api,web,admin}:<SHA> + :latest

stages:
  - audit
  - build

# SEC-006: dependency-vulnerability gate. Runs `pnpm audit` restricted to the
# production dependency tree and fails on prod-level HIGH (and above).
#
# allow_failure is TEMPORARILY true: there are still prod-HIGH advisories for
# `next` that only patch in 15.x (a Next 14 -> 15 major is tracked as a
# separate task, intentionally NOT bundled with this hardening pass right
# before a prod deploy). The job therefore reports the findings without
# blocking the release.
#
# TODO(SEC-006): after the Next 15 upgrade lands and `pnpm audit --prod
# --audit-level high` is clean, flip allow_failure to false so regressions
# (new prod-HIGH deps) hard-fail the pipeline.
audit:deps:
  stage: audit
  image: node:22-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.26.1 --activate
  script:
    - pnpm install --frozen-lockfile
    - pnpm audit --prod --audit-level high
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

.kaniko-build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script:
    # Kaniko читает /kaniko/.docker/config.json для авторизации в registry.
    # CI_REGISTRY_USER + CI_REGISTRY_PASSWORD автоматически инжектятся GitLab'ом
    # (это short-lived job-token для CI_REGISTRY).
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {
        "auths": {
          "${CI_REGISTRY}": {
            "auth": "$(printf '%s' "${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')"
          }
        }
      }
      EOF
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

build:api:
  extends: .kaniko-build
  script:
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/apps/api/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/api:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/api:latest"
      --cache=true
      --cache-repo "${CI_REGISTRY_IMAGE}/api/cache"

build:web:
  extends: .kaniko-build
  script:
    # NEXT_PUBLIC_* запекаются в client-бандл при `next build`. Без них fetch
    # клиентских компонентов (captcha, contact form) уходит на localhost:3001.
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/apps/web/Dockerfile"
      --build-arg NEXT_PUBLIC_API_URL=https://api.webmogilevtsev.ru
      --build-arg NEXT_PUBLIC_SITE_URL=https://webmogilevtsev.ru
      --destination "${CI_REGISTRY_IMAGE}/web:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/web:latest"
      --cache=true
      --cache-repo "${CI_REGISTRY_IMAGE}/web/cache"

build:admin:
  extends: .kaniko-build
  script:
    # VITE_API_URL запекается в JS-бандл при сборке (Vite ARG → ENV).
    # При смене публичного API URL — пересобрать admin с новым build-arg.
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/apps/admin/Dockerfile"
      --build-arg VITE_API_URL=https://api.webmogilevtsev.ru
      --destination "${CI_REGISTRY_IMAGE}/admin:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/admin:latest"
      --cache=true
      --cache-repo "${CI_REGISTRY_IMAGE}/admin/cache"
